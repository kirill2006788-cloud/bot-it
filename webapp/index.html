<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Code Assistant</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/monokai.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/python/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/htmlmixed/htmlmixed.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/css/css.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Верхняя панель навигации -->
        <div class="top-nav">
            <button class="nav-btn active" data-view="chat">
                <span>💬</span>
                <span>AI Chat</span>
            </button>
            <button class="nav-btn" data-view="editor">
                <span>💻</span>
                <span>Editor</span>
            </button>
            <button class="nav-btn" data-view="projects">
                <span>📁</span>
                <span>Projects</span>
            </button>
        </div>

        <!-- Контент -->
        <div class="content">
            <!-- AI Chat View -->
            <div id="chat-view" class="view active">
                <div class="chat-header">
                    <h2>💬 AI Chat</h2>
                    <p>Общайся с Claude AI</p>
                </div>
                <div class="chat-messages" id="chatMessages"></div>
                <div class="chat-input-container">
                    <textarea id="chatInput" placeholder="Напиши сообщение..."></textarea>
                    <button id="sendBtn" class="send-btn">
                        <span>📤</span>
                    </button>
                </div>
            </div>

            <!-- Code Editor View -->
            <div id="editor-view" class="view">
                <div class="editor-header">
                    <h2>💻 Code Editor</h2>
                    <div class="editor-controls">
                        <select id="languageSelect">
                            <option value="python">Python</option>
                            <option value="javascript">JavaScript</option>
                            <option value="htmlmixed">HTML</option>
                            <option value="css">CSS</option>
                        </select>
                        <button id="aiHelpBtn" class="action-btn">🤖 AI Помощь</button>
                        <button id="saveCodeBtn" class="action-btn">💾 Сохранить</button>
                    </div>
                </div>
                <div id="codeEditor"></div>
                <div class="ai-suggestions" id="aiSuggestions"></div>
            </div>

            <!-- Project Manager View -->
            <div id="projects-view" class="view">
                <div class="projects-header">
                    <h2>📁 Project Manager</h2>
                    <button id="createProjectBtn" class="action-btn">➕ Новый проект</button>
                </div>
                <div class="projects-content">
                    <div class="project-form" id="projectForm">
                        <h3>Создать проект</h3>
                        <input type="text" id="projectName" placeholder="Название проекта">
                        <textarea id="projectDesc" placeholder="Описание проекта (что он должен делать)"></textarea>
                        <div class="form-actions">
                            <button id="generateProjectBtn" class="primary-btn">🚀 Сгенерировать</button>
                            <button id="cancelProjectBtn" class="secondary-btn">❌ Отмена</button>
                        </div>
                    </div>
                    <div class="projects-list" id="projectsList">
                        <p class="empty-state">Пока нет проектов. Создайте первый!</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Индикатор загрузки -->
        <div class="loading-overlay" id="loadingOverlay">
            <div class="spinner"></div>
            <p>Обрабатываю...</p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
